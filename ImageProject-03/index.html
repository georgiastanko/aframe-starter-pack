<!DOCTYPE html>
<html>
  <head>
    <title>Desert Disco</title>
  </head>
  <body>
    <a-scene>
      <a-sky src="../ImageProject-03/DesertSky.png"></a-sky>
      <a-plane src="../ImageProject-03/desert floor.jpg" rotation="-90 0 0" width="50" height="50" color="#c2b280"></a-plane>
      <a-box 
        src="../ImageProject-03/boombox.jpg" color="grey" position="3 1 -4" scale="1.2 1.2 1.2"

      <a-sphere src="../ImageProject-03/DiscoTexture.jpg" position="0 8 -1" radius="1" color="grey"

      <a-plane
        src="../ImageProject-03/dancefloor.jpg" position="0 0.1 -5" rotation="-90 0 0" width="9" height="9" color="blue"
      ></a-plane>


    </a-scene>
